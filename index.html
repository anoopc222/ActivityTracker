<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FitZo Clean</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
<h2>FitZo Clean Sync</h2>

<input id="email" placeholder="email"><br>
<input id="password" placeholder="password" type="password"><br>
<button onclick="login()">Login</button>

<hr>

<input id="date" placeholder="YYYY-MM-DD">
<input id="weight" placeholder="weight">
<button onclick="saveWeight()">Save Weight</button>

<script>
const supabase = window.supabase.createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if(error) alert(error.message);
  else alert("Logged in");
}

async function saveWeight(){
  const user = (await supabase.auth.getUser()).data.user;
  if(!user){
    alert("Login first");
    return;
  }

  const date = document.getElementById('date').value;
  const weight = parseFloat(document.getElementById('weight').value);

  const { error } = await supabase.from('fitzo_weight').upsert({
    user_id: user.id,
    date,
    weight,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,date' });

  if(error) alert(error.message);
  else alert("Saved to cloud");
}
</script>

</body>
</html>
